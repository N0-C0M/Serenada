name: SDK API Docs

on:
  push:
    branches: [main]
    paths:
      - 'client/packages/core/package.json'
      - 'client/packages/react-ui/package.json'
      - 'client/packages/core/src/index.ts'
      - 'client-android/serenada-core/build.gradle.kts'
      - 'client-android/serenada-call-ui/build.gradle.kts'
      - 'client-ios/SerenadaCore/Sources/SerenadaCore.swift'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docs-web:
    name: Web (TypeDoc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Generate @serenada/core docs
        working-directory: client
        run: npx typedoc --options packages/core/typedoc.json

      - name: Generate @serenada/react-ui docs
        working-directory: client
        run: npx typedoc --options packages/react-ui/typedoc.json

      - name: Upload core docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-web-core
          path: client/packages/core/docs/

      - name: Upload react-ui docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-web-react-ui
          path: client/packages/react-ui/docs/

  docs-android:
    name: Android (Dokka)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: client-android/*.gradle.kts

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Generate Dokka docs
        working-directory: client-android
        run: ./gradlew :serenada-core:dokkaHtml :serenada-call-ui:dokkaHtml --no-daemon

      - name: Upload core docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-android-core
          path: client-android/serenada-core/build/dokka/html/

      - name: Upload call-ui docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-android-call-ui
          path: client-android/serenada-call-ui/build/dokka/html/

  docs-ios:
    name: iOS (DocC)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build SerenadaCore documentation
        working-directory: client-ios/SerenadaCore
        run: |
          xcodebuild docbuild \
            -scheme SerenadaCore \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ../.docbuild/core

          ARCHIVE=$(find ../.docbuild/core -name 'SerenadaCore.doccarchive' -type d | head -1)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)
          $(xcrun --find docc) process-archive transform-for-static-hosting \
            "$ARCHIVE" \
            --output-path ../docs-core \
            --hosting-base-path "$REPO_NAME/ios/core"

      - name: Build SerenadaCallUI documentation
        working-directory: client-ios/SerenadaCallUI
        run: |
          xcodebuild docbuild \
            -scheme SerenadaCallUI \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ../.docbuild/callui

          REPO_NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)
          ARCHIVE=$(find ../.docbuild/callui -name 'SerenadaCallUI.doccarchive' -type d | head -1)
          $(xcrun --find docc) process-archive transform-for-static-hosting \
            "$ARCHIVE" \
            --output-path ../docs-callui \
            --hosting-base-path "$REPO_NAME/ios/call-ui"

      - name: Fix DocC asset paths for GitHub Pages
        working-directory: client-ios
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)
          for dir_and_path in "docs-core ios/core" "docs-callui ios/call-ui"; do
            dir="${dir_and_path%% *}"
            subpath="${dir_and_path#* }"
            base="/$REPO_NAME/$subpath"
            # Fix the Vue app baseUrl and rewrite absolute asset paths
            sed -i '' \
              -e "s|var baseUrl = \"/\"|var baseUrl = \"$base\"|" \
              -e "s|href=\"/|href=\"$base/|g" \
              -e "s|src=\"/|src=\"$base/|g" \
              "$dir/index.html"
          done

      - name: Tar docs to preserve filenames with special characters
        working-directory: client-ios
        run: |
          tar -czf docs-core.tar.gz -C docs-core .
          tar -czf docs-callui.tar.gz -C docs-callui .

      - name: Upload core docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-ios-core
          path: client-ios/docs-core.tar.gz

      - name: Upload call-ui docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-ios-call-ui
          path: client-ios/docs-callui.tar.gz

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [docs-web, docs-android, docs-ios]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: client/packages/core/package.json
          sparse-checkout-cone-mode: false

      - name: Download all doc artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Assemble site
        run: |
          mkdir -p site/web/core site/web/react-ui \
                   site/android/core site/android/call-ui \
                   site/ios/core site/ios/call-ui

          cp -r artifacts/docs-web-core/*      site/web/core/
          cp -r artifacts/docs-web-react-ui/*  site/web/react-ui/
          cp -r artifacts/docs-android-core/*  site/android/core/
          cp -r artifacts/docs-android-call-ui/* site/android/call-ui/
          tar -xzf artifacts/docs-ios-core/docs-core.tar.gz -C site/ios/core/
          tar -xzf artifacts/docs-ios-call-ui/docs-callui.tar.gz -C site/ios/call-ui/

      - name: Generate landing page
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('client/packages/core/package.json','utf8')).version)")
          cat > site/index.html <<LANDING
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Serenada SDK API Docs</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 720px; margin: 0 auto; padding: 48px 24px; color: #1a1a2e; }
              h1 { font-size: 1.8rem; margin-bottom: 8px; }
              .version { color: #666; margin-bottom: 40px; }
              .platform { margin-bottom: 32px; }
              .platform h2 { font-size: 1.2rem; margin-bottom: 12px; border-bottom: 2px solid #e8e8e8; padding-bottom: 8px; }
              .platform ul { list-style: none; padding-left: 0; }
              .platform li { margin-bottom: 8px; }
              .platform a { color: #2563eb; text-decoration: none; }
              .platform a:hover { text-decoration: underline; }
              .desc { color: #666; font-size: 0.9rem; }
            </style>
          </head>
          <body>
            <h1>Serenada SDK</h1>
            <p class="version">API Reference — v${VERSION}</p>

            <div class="platform">
              <h2>Web (TypeScript)</h2>
              <ul>
                <li><a href="web/core/">@serenada/core</a> <span class="desc">— Headless WebRTC call engine</span></li>
                <li><a href="web/react-ui/">@serenada/react-ui</a> <span class="desc">— React UI components</span></li>
              </ul>
            </div>

            <div class="platform">
              <h2>Android (Kotlin)</h2>
              <ul>
                <li><a href="android/core/">serenada-core</a> <span class="desc">— Headless SDK</span></li>
                <li><a href="android/call-ui/">serenada-call-ui</a> <span class="desc">— Jetpack Compose UI</span></li>
              </ul>
            </div>

            <div class="platform">
              <h2>iOS (Swift)</h2>
              <ul>
                <li><a href="ios/core/documentation/serenadacore/">SerenadaCore</a> <span class="desc">— Headless SDK</span></li>
                <li><a href="ios/call-ui/documentation/serenadacallui/">SerenadaCallUI</a> <span class="desc">— SwiftUI call flow</span></li>
              </ul>
            </div>
          </body>
          </html>
          LANDING

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
