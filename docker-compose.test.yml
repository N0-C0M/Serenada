services:
  app-server:
    container_name: serenada-test-server
    ports:
      - "127.0.0.1:${TEST_APP_HTTP_PORT:-18080}:8080"

  coturn:
    container_name: serenada-test-coturn
    profiles:
      - test-coturn
    ports:
      - "3479:3478/udp"
      - "3479:3478/tcp"
      - "49201-49249:49152-49200/udp"

  nginx:
    container_name: serenada-test-nginx
    ports:
      - "127.0.0.1:${TEST_STACK_HTTP_PORT:-18081}:80"
    volumes:
      - ./nginx/nginx.test.conf:/etc/nginx/nginx.conf
      - ./client/dist:/var/www/serenada/dist
